{% if ymap %}
  {% load i18n static djeymtags %}
  {% with lang.0 as language_code %}
    <link href="{% static 'djeym/vue_vendors/front/css/chunk-vendors.css' %}"
          rel="stylesheet">
    <link href="{% static 'djeym/vue_vendors/front/css/app.css' %}"
          rel="stylesheet">
    <style type="text/css">
      #djeymModalLock { display: block; }
    </style>
    <script>
  var djeymMapID = {{ ymap.pk }},
    djeymCSRFToken = '{{ csrf_token }}',
    djeymLanguageCode = '{{ language_code }}',
    djeymWidthMap = '{{ width_map_front }}',
    djeymHeightMap = '{{ height_map_front }}',
    djeymBalloonMinHeight = 60;
    </script>
    {% djeym_load_api_ymaps language_code %}
    {% if is_heatmap %}
      <script src="{% static "djeym/plugins/heatmap.js" %}"></script>
    {% endif %}
    <script type="module"
            src="{% static 'djeym/vue_vendors/front/js/chunk-vendors.js' %}"></script>
    <script type="module" src="{% static 'djeym/vue_vendors/front/js/app.js' %}"></script>
    <script>!function(){var e=document,t=e.createElement("script");if(!("noModule"in t)&&"onbeforeload"in t){var n=!1;e.addEventListener("beforeload",function(e){if(e.target===t)n=!0;else if(!e.target.hasAttribute("nomodule")||!n)return;e.preventDefault()},!0),t.type="module",t.src=".",e.head.appendChild(t),t.remove()}}();</script>
  {% endwith %}
{% endif %}
