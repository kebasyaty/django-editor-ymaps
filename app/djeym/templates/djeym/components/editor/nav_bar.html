{% load i18n static %}

<nav class="d-flex flex-nowrap min-vh-100"
     data-bs-theme="{{ settings.theme_type }}">
  <div class="d-flex flex-column flex-shrink-0 bg-nav-bar">
    <ul class="nav flex-column">
      <li class="nav-item d-grid gap-2 bg-nav-bar-item">
        <button type="button"
                class="btn btn-link"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                {% if is_dark_theme %}data-bs-custom-class="dark-tooltip"{% endif %}
                data-bs-title="{% trans 'Filter by categories' %}">
          <span class="mdi mdi-menu mdi-36px nav-bar-icon-color"></span>
        </button>
      </li>
      <li class="nav-item d-grid gap-2 bg-nav-bar-item">
        <button type="button"
                class="btn btn-link"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                {% if is_dark_theme %}data-bs-custom-class="dark-tooltip"{% endif %}
                data-bs-title="{% trans 'Go back to admin panel' %}">
          <span class="mdi mdi-arrow-left-top mdi-36px nav-bar-icon-color"></span>
        </button>
      </li>
      <li class="nav-item d-grid gap-2 bg-nav-bar-item">
        <button type="button"
                class="btn btn-link"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                {% if is_dark_theme %}data-bs-custom-class="dark-tooltip"{% endif %}
                data-bs-title="{% trans 'Settings' %}">
          <span class="mdi mdi-cog-outline mdi-36px nav-bar-icon-color"></span>
        </button>
      </li>
      <li class="nav-item d-grid gap-2 bg-nav-bar-item">
        <button type="button"
                class="btn btn-link"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                {% if is_dark_theme %}data-bs-custom-class="dark-tooltip"{% endif %}
                data-bs-title="{% trans 'Help' %}">
          <span class="mdi mdi-help-circle-outline mdi-36px nav-bar-icon-color"></span>
        </button>
      </li>
      <li class="nav-item d-grid gap-2 bg-nav-bar-item">
        <button type="button"
                class="btn btn-link"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                {% if is_dark_theme %}data-bs-custom-class="dark-tooltip"{% endif %}
                data-bs-title="{% trans 'Show editable geo-object' %}">
          <span class="mdi mdi-crosshairs-gps mdi-36px editable-geo-object-icon-color"></span>
        </button>
      </li>
    </ul>
  </div>
</nav>

{% if is_dark_theme %}
  <style>
    .bg-nav-bar {
      width: 64px;
      background-color: #2D313A;
    }

    .bg-nav-bar-item {
      background-color: #2D313A;
    }

    .bg-nav-bar-item:hover {
      background-color: #3e4450;
    }

    .nav-bar-icon-color {
      color: #A9B0BD;
    }

    .editable-geo-object-icon-color {
      color: #dc3545;
    }
  </style>
{% else %}
  <style>
    .bg-nav-bar {
      width: 64px;
      background-color: #26C6DA;
    }

    .bg-nav-bar-item {
      background-color: #26C6DA;
    }

    .bg-nav-bar-item:hover {
      background-color: #4DD0E1;
    }

    .nav-bar-icon-color {
      color: #fff;
    }

    .editable-geo-object-icon-color {
      color: #e685b5;
    }
  </style>
{% endif %}
